workflows:

  # ───────────────────────────────────────────────────────────────────
  # iOS Release → App Store Connect
  # ───────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials   # APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_API_KEY, APP_STORE_CONNECT_ISSUER_ID
      vars:
        BUNDLE_ID: com.wagaf.app
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Install dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign \
            --build-name=$(echo $CM_TAG | sed 's/v//') \
            --build-number=$PROJECT_BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

      email:
        recipients:
          - cmdelemine@gmail.com
        notify:
          success: true
          failure: true

  # ───────────────────────────────────────────────────────────────────
  # Android Release → Google Play
  # ───────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      groups:
        - google_play_credentials   # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        - keystore_credentials      # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_STORE_PASSWORD

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Set up Android keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          echo "storePassword=$CM_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=/tmp/keystore.jks" >> android/key.properties

      - name: Install dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            --build-name=$(echo $CM_TAG | sed 's/v//') \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

      email:
        recipients:
          - cmdelemine@gmail.com
        notify:
          success: true
          failure: true

  # ───────────────────────────────────────────────────────────────────
  # Web Release
  # ───────────────────────────────────────────────────────────────────
  web-release:
    name: Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: stable

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build Web
        script: |
          flutter build web --release \
            --web-renderer canvaskit \
            --build-name=$(echo $CM_TAG | sed 's/v//') \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/web/**

    publishing:
      email:
        recipients:
          - cmdelemine@gmail.com
        notify:
          success: true
          failure: true

  # ───────────────────────────────────────────────────────────────────
  # Development build — manual trigger
  # ───────────────────────────────────────────────────────────────────
  dev-build:
    name: Dev Build (iOS + Android + Web)
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build iOS (no signing)
        script: flutter build ios --debug --no-codesign

      - name: Build Android APK
        script: flutter build apk --debug

      - name: Build Web
        script: flutter build web --debug

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/web/**
