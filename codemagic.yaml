workflows:

  # ───────────────────────────────────────────────────────────────────
  # iOS Release → App Store Connect
  # ───────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials   # APPLE_ID, APP_SPECIFIC_PASSWORD, APP_STORE_APPLE_ID
        - supabase_credentials    # SUPABASE_URL, SUPABASE_ANON_KEY
      vars:
        BUNDLE_ID: com.wagaf.app
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Validate Supabase credentials
        script: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "══════════════════════════════════════════════════════════"
            echo "  ERROR: Supabase credentials are missing!"
            echo ""
            echo "  Go to Codemagic → Your app → Environment variables"
            echo "  and create a group named: supabase_credentials"
            echo "  with these two variables:"
            echo "    SUPABASE_URL      = https://xxxx.supabase.co"
            echo "    SUPABASE_ANON_KEY = eyJhbGci..."
            echo "══════════════════════════════════════════════════════════"
            exit 1
          fi
          echo "✓ SUPABASE_URL      = ${SUPABASE_URL:0:35}..."
          echo "✓ SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY:0:20}..."

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Install dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            --build-name=$(echo $CM_TAG | sed 's/v//') \
            --build-number=$PROJECT_BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false   # Set to true when ready for public release

      email:
        recipients:
          - cmdelemine@gmail.com
        notify:
          success: true
          failure: true

  # ───────────────────────────────────────────────────────────────────
  # Android Release → Google Play
  # ───────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      groups:
        - google_play_credentials   # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        - keystore_credentials      # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_STORE_PASSWORD
        - supabase_credentials      # SUPABASE_URL, SUPABASE_ANON_KEY

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Validate Supabase credentials
        script: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "══════════════════════════════════════════════════════════"
            echo "  ERROR: Supabase credentials are missing!"
            echo ""
            echo "  Go to Codemagic → Your app → Environment variables"
            echo "  and create a group named: supabase_credentials"
            echo "  with these two variables:"
            echo "    SUPABASE_URL      = https://xxxx.supabase.co"
            echo "    SUPABASE_ANON_KEY = eyJhbGci..."
            echo "══════════════════════════════════════════════════════════"
            exit 1
          fi
          echo "✓ SUPABASE_URL      = ${SUPABASE_URL:0:35}..."
          echo "✓ SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY:0:20}..."

      - name: Set up Android keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/keystore.jks
          echo "storePassword=$CM_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=/tmp/keystore.jks" >> android/key.properties

      - name: Install dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build AAB
        script: |
          flutter build appbundle --release \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            --build-name=$(echo $CM_TAG | sed 's/v//') \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

      email:
        recipients:
          - cmdelemine@gmail.com
        notify:
          success: true
          failure: true

  # ───────────────────────────────────────────────────────────────────
  # Web Release → build artifact (deploy manually or via hosting)
  # ───────────────────────────────────────────────────────────────────
  web-release:
    name: Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: stable
      groups:
        - supabase_credentials      # SUPABASE_URL, SUPABASE_ANON_KEY

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Validate Supabase credentials
        script: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "══════════════════════════════════════════════════════════"
            echo "  ERROR: Supabase credentials are missing!"
            echo "  Create group 'supabase_credentials' in Codemagic with:"
            echo "    SUPABASE_URL  and  SUPABASE_ANON_KEY"
            echo "══════════════════════════════════════════════════════════"
            exit 1
          fi
          echo "✓ SUPABASE_URL      = ${SUPABASE_URL:0:35}..."
          echo "✓ SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY:0:20}..."

      - name: Install dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build Web
        script: |
          flutter build web --release \
            --web-renderer canvaskit \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" \
            --build-name=$(echo $CM_TAG | sed 's/v//') \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - build/web/**

    publishing:
      email:
        recipients:
          - cmdelemine@gmail.com
        notify:
          success: true
          failure: true

  # ───────────────────────────────────────────────────────────────────
  # Development build — manual trigger for testing
  # ───────────────────────────────────────────────────────────────────
  dev-build:
    name: Dev Build (iOS + Android + Web)
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - supabase_credentials      # SUPABASE_URL, SUPABASE_ANON_KEY

    scripts:
      - name: Validate Supabase credentials
        script: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "══════════════════════════════════════════════════════════"
            echo "  ERROR: Supabase credentials are missing!"
            echo "  Create group 'supabase_credentials' in Codemagic with:"
            echo "    SUPABASE_URL  and  SUPABASE_ANON_KEY"
            echo "══════════════════════════════════════════════════════════"
            exit 1
          fi
          echo "✓ SUPABASE_URL      = ${SUPABASE_URL:0:35}..."
          echo "✓ SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY:0:20}..."

      - name: Install dependencies
        script: flutter pub get

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Build iOS (no signing)
        script: |
          flutter build ios --debug --no-codesign \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"

      - name: Build Android APK
        script: |
          flutter build apk --debug \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"

      - name: Build Web
        script: |
          flutter build web --debug \
            "--dart-define=SUPABASE_URL=$SUPABASE_URL" \
            "--dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/web/**
